---
- name: Check certificate exporter images before setup
  command:
    argv:
      - crictl
      - pull
      - "{{ __registry_prefix }}/{{ item }}"
  loop: "{{ service_image_requirements.cert_exporter | default([]) | flatten | unique | list }}"
  loop_control:
    label: "{{ __registry_prefix }}/{{ item }}"
  changed_when: false
  when:
    - "'cert_exporter' in k8s_install_services"
    - inventory_hostname == groups['k8s_master'][0]

- name: Render cert-exporter manifest on bootstrap master
  template:
    src: cert-exporter.yaml.j2
    dest: "{{ __bootstrap_dir }}/cert-exporter.yaml"
  when:
    - "'cert_exporter' in k8s_install_services"
    - inventory_hostname == groups['k8s_master'][0]

- name: Apply cert-exporter
  shell: |
    set -Eeuo pipefail
    kubectl apply -f {{ __bootstrap_dir }}/cert-exporter.yaml
  args:
    executable: /bin/bash
  when:
    - "'cert_exporter' in k8s_install_services"
    - inventory_hostname == groups['k8s_master'][0]
