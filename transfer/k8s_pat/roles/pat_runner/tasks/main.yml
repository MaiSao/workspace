---
- name: Show PAT scope
  debug:
    msg:
      - "Kubernetes PAT run: {{ pat_run_id | default('manual') }}"
      - "bootstrap master: {{ pat_bootstrap_master }}"
      - "case count: {{ pat_cases | length }}"
      - "host: {{ inventory_hostname }}"
  tags:
    - pat
    - always

- name: Initialize host PAT results
  set_fact:
    pat_results: []
  tags:
    - pat
    - always

- name: Ensure PAT report directory exists on bootstrap master
  file:
    path: "{{ pat_output_dir }}"
    state: directory
    mode: "0750"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Discover actual Kubernetes feature usage
  shell: |
    set -Eeuo pipefail
    export KUBECONFIG={{ pat_kubeconfig | default('/etc/kubernetes/admin.conf') }}
    app_namespaces="$(
      kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
      awk '$1 !~ /{{ pat_app_namespace_exclude_regex }}/ { print }' |
      paste -sd, -
    )"
    pvc_storage_classes="$(
      kubectl get pvc --all-namespaces -o jsonpath='{range .items[*]}{.spec.storageClassName}{"\n"}{end}' 2>/dev/null |
      awk 'NF { print }' | sort -u | paste -sd, -
    )"
    nad_references="$(
      kubectl get pods --all-namespaces -o jsonpath='{range .items[*]}{.metadata.annotations.k8s\.v1\.cni\.cncf\.io/networks}{"\n"}{end}' 2>/dev/null |
      awk 'NF { print }' | paste -sd, -
    )"
    networkpolicy_count="$(kubectl get networkpolicy --all-namespaces --no-headers 2>/dev/null | wc -l)"
    hpa_count="$(kubectl get hpa --all-namespaces --no-headers 2>/dev/null | wc -l)"
    pdb_count="$(kubectl get pdb --all-namespaces --no-headers 2>/dev/null | wc -l)"
    ingress_count="$(kubectl get ingress --all-namespaces --no-headers 2>/dev/null | wc -l || true)"
    gateway_count="$(kubectl get gateway --all-namespaces --no-headers 2>/dev/null | wc -l || true)"
    cat <<EOF
    app_namespaces=${app_namespaces}
    pvc_storage_classes=${pvc_storage_classes}
    nad_references=${nad_references}
    networkpolicy_count=${networkpolicy_count}
    hpa_count=${hpa_count}
    pdb_count=${pdb_count}
    ingress_count=${ingress_count}
    gateway_count=${gateway_count}
    EOF
  args:
    executable: /bin/bash
  register: __pat_usage_discovery
  changed_when: false
  failed_when: false
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - always

- name: Record actual Kubernetes feature usage
  set_fact:
    pat_usage_app_namespaces: "{{ (__pat_usage_discovery.stdout | regex_search('app_namespaces=(.*)', '\\1') | first | default('')) }}"
    pat_usage_pvc_storage_classes: "{{ (__pat_usage_discovery.stdout | regex_search('pvc_storage_classes=(.*)', '\\1') | first | default('')) }}"
    pat_usage_nad_references: "{{ (__pat_usage_discovery.stdout | regex_search('nad_references=(.*)', '\\1') | first | default('')) }}"
    pat_usage_networkpolicy_count: "{{ (__pat_usage_discovery.stdout | regex_search('networkpolicy_count=([0-9]+)', '\\1') | first | default('0')) | int }}"
    pat_usage_hpa_count: "{{ (__pat_usage_discovery.stdout | regex_search('hpa_count=([0-9]+)', '\\1') | first | default('0')) | int }}"
    pat_usage_pdb_count: "{{ (__pat_usage_discovery.stdout | regex_search('pdb_count=([0-9]+)', '\\1') | first | default('0')) | int }}"
    pat_usage_ingress_count: "{{ (__pat_usage_discovery.stdout | regex_search('ingress_count=([0-9]+)', '\\1') | first | default('0')) | int }}"
    pat_usage_gateway_count: "{{ (__pat_usage_discovery.stdout | regex_search('gateway_count=([0-9]+)', '\\1') | first | default('0')) | int }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - always

- name: Build effective PAT case list
  set_fact:
    pat_effective_cases: "{{ (pat_effective_cases | default([])) + [pat_case_defaults | combine(item, recursive=True)] }}"
  loop: "{{ pat_cases }}"
  loop_control:
    label: "{{ item.id }} {{ item.title | default('') }}"
  tags:
    - pat
    - always

- name: Record catalog cases not automated yet
  set_fact:
    pat_results: "{{ pat_results + [__pat_catalog_gap_result] }}"
  vars:
    __pat_automated_case_ids: "{{ pat_effective_cases | map(attribute='id') | list }}"
    __pat_catalog_gap_result:
      id: "{{ item }}"
      title: "Catalog case not automated yet"
      priority: "P?"
      mode: "CATALOG"
      category: "catalog-gap"
      scope: "catalog"
      host: "cluster"
      status: "N/A"
      reason: "Case is defined in PAT_CASES.md but has no automated command in pat_cases yet."
      recommendation: "Implement an Ansible command, or attach approved manual/HYBRID evidence and mark applicability explicitly."
      rc: 0
      stdout: ""
      stderr: ""
  loop: "{{ pat_catalog_case_ids | difference(__pat_automated_case_ids) | sort }}"
  loop_control:
    label: "{{ item }}"
  when:
    - inventory_hostname == pat_bootstrap_master
    - pat_record_catalog_gap_cases | bool
  tags:
    - pat
    - report

- name: Record N/A PAT cases on bootstrap master
  set_fact:
    pat_results: "{{ pat_results + [__pat_na_result] }}"
  vars:
    __pat_enabled: "{{ item.enabled | default(true) | bool }}"
    __pat_applicable: "{{ item.applicable | default(true) | bool }}"
    __pat_na_result:
      id: "{{ item.id }}"
      title: "{{ item.title }}"
      priority: "{{ item.priority }}"
      mode: "{{ item.mode }}"
      category: "{{ item.category }}"
      scope: "{{ item.scope }}"
      host: "cluster"
      status: "N/A"
      reason: >-
        {{
          item.na_reason
          if (item.na_reason | default('') | length > 0)
          else ('Case is disabled.' if not (__pat_enabled | bool) else 'Feature is not applicable to the approved design.')
        }}
      recommendation: "{{ item.recommendation }}"
      rc: 0
      stdout: ""
      stderr: ""
  loop: "{{ pat_effective_cases }}"
  loop_control:
    label: "{{ item.id }} {{ item.title }}"
  when:
    - inventory_hostname == pat_bootstrap_master
    - (not (__pat_enabled | bool)) or (not (__pat_applicable | bool))
  tags:
    - pat
    - report

- name: Run host-scope PAT cases
  shell: |
    set -Eeuo pipefail
    export KUBECONFIG={{ pat_kubeconfig | default('/etc/kubernetes/admin.conf') }}
    timeout {{ pat_command_timeout_seconds | int }}s bash -Eeuo pipefail <<'PAT_CASE'
    {{ item.command }}
    PAT_CASE
  args:
    executable: /bin/bash
  register: __pat_host_runs
  changed_when: false
  failed_when: false
  loop: "{{ pat_effective_cases }}"
  loop_control:
    label: "{{ item.id }} {{ item.title }}"
  when:
    - item.enabled | default(true) | bool
    - item.applicable | default(true) | bool
    - item.scope in ['host', 'all'] or (item.scope == 'master' and inventory_hostname in pat_master_hosts) or (item.scope == 'worker' and inventory_hostname in pat_worker_hosts)
  tags:
    - pat
    - host

- name: Record host-scope PAT results
  set_fact:
    pat_results: "{{ pat_results + [__pat_result] }}"
  vars:
    __pat_case: "{{ item.item }}"
    __pat_result:
      id: "{{ __pat_case.id }}"
      title: "{{ __pat_case.title }}"
      priority: "{{ __pat_case.priority }}"
      mode: "{{ __pat_case.mode }}"
      category: "{{ __pat_case.category }}"
      scope: "{{ __pat_case.scope }}"
      host: "{{ inventory_hostname }}"
      status: "{{ 'PASS' if (item.rc | int) == 0 else 'FAILED' }}"
      reason: "{{ __pat_case.success_hint if (item.rc | int) == 0 else ((item.stderr | default('') | trim) or (item.stdout | default('') | trim) or 'Command returned non-zero exit code.') }}"
      recommendation: "{{ '' if (item.rc | int) == 0 else __pat_case.recommendation }}"
      rc: "{{ item.rc | int }}"
      stdout: "{{ item.stdout | default('') | trim }}"
      stderr: "{{ item.stderr | default('') | trim }}"
  loop: "{{ __pat_host_runs.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id | default('skipped') }}"
  when:
    - item.skipped is not defined
  tags:
    - pat
    - host

- name: Run cluster-scope PAT cases on bootstrap master
  shell: |
    set -Eeuo pipefail
    export KUBECONFIG={{ pat_kubeconfig | default('/etc/kubernetes/admin.conf') }}
    timeout {{ pat_command_timeout_seconds | int }}s bash -Eeuo pipefail <<'PAT_CASE'
    {{ item.command }}
    PAT_CASE
  args:
    executable: /bin/bash
  register: __pat_cluster_runs
  changed_when: false
  failed_when: false
  loop: "{{ pat_effective_cases }}"
  loop_control:
    label: "{{ item.id }} {{ item.title }}"
  when:
    - inventory_hostname == pat_bootstrap_master
    - item.enabled | default(true) | bool
    - item.applicable | default(true) | bool
    - item.scope == 'cluster'
  tags:
    - pat
    - cluster

- name: Record cluster-scope PAT results
  set_fact:
    pat_results: "{{ pat_results + [__pat_result] }}"
  vars:
    __pat_case: "{{ item.item }}"
    __pat_result:
      id: "{{ __pat_case.id }}"
      title: "{{ __pat_case.title }}"
      priority: "{{ __pat_case.priority }}"
      mode: "{{ __pat_case.mode }}"
      category: "{{ __pat_case.category }}"
      scope: "{{ __pat_case.scope }}"
      host: "cluster"
      status: "{{ 'PASS' if (item.rc | int) == 0 else 'FAILED' }}"
      reason: "{{ __pat_case.success_hint if (item.rc | int) == 0 else ((item.stderr | default('') | trim) or (item.stdout | default('') | trim) or 'Command returned non-zero exit code.') }}"
      recommendation: "{{ '' if (item.rc | int) == 0 else __pat_case.recommendation }}"
      rc: "{{ item.rc | int }}"
      stdout: "{{ item.stdout | default('') | trim }}"
      stderr: "{{ item.stderr | default('') | trim }}"
  loop: "{{ __pat_cluster_runs.results | default([]) }}"
  loop_control:
    label: "{{ item.item.id | default('skipped') }}"
  when:
    - inventory_hostname == pat_bootstrap_master
    - item.skipped is not defined
  tags:
    - pat
    - cluster

- name: Aggregate PAT results on bootstrap master
  set_fact:
    pat_all_results: "{{ (pat_all_results | default([])) + (hostvars[item].pat_results | default([])) }}"
  loop: "{{ pat_cluster_hosts }}"
  loop_control:
    label: "{{ item }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Calculate PAT summary
  set_fact:
    pat_assertion_pass_count: "{{ pat_all_results | selectattr('status', 'equalto', 'PASS') | list | length }}"
    pat_assertion_failed_count: "{{ pat_all_results | selectattr('status', 'equalto', 'FAILED') | list | length }}"
    pat_assertion_na_count: "{{ pat_all_results | selectattr('status', 'equalto', 'N/A') | list | length }}"
    pat_assertion_total_count: "{{ pat_all_results | length }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Build unique PAT case summary
  set_fact:
    pat_case_summary: "{{ (pat_case_summary | default([])) + [__pat_case_summary_item] }}"
  vars:
    __pat_case_items: "{{ pat_all_results | selectattr('id', 'equalto', item) | list }}"
    __pat_first_case_item: "{{ __pat_case_items | first }}"
    __pat_case_failed_count: "{{ __pat_case_items | selectattr('status', 'equalto', 'FAILED') | list | length }}"
    __pat_case_pass_count: "{{ __pat_case_items | selectattr('status', 'equalto', 'PASS') | list | length }}"
    __pat_case_na_count: "{{ __pat_case_items | selectattr('status', 'equalto', 'N/A') | list | length }}"
    __pat_case_status: >-
      {{
        'FAILED'
        if (__pat_case_failed_count | int) > 0
        else ('PASS' if (__pat_case_pass_count | int) > 0 else 'N/A')
      }}
    __pat_case_summary_item:
      id: "{{ item }}"
      title: "{{ __pat_first_case_item.title }}"
      priority: "{{ __pat_first_case_item.priority }}"
      mode: "{{ __pat_first_case_item.mode }}"
      category: "{{ __pat_first_case_item.category }}"
      status: "{{ __pat_case_status }}"
      assertion_total: "{{ __pat_case_items | length }}"
      assertion_pass: "{{ __pat_case_pass_count | int }}"
      assertion_failed: "{{ __pat_case_failed_count | int }}"
      assertion_na: "{{ __pat_case_na_count | int }}"
  loop: "{{ pat_all_results | map(attribute='id') | unique | sort }}"
  loop_control:
    label: "{{ item }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Calculate unique PAT case summary
  set_fact:
    pat_pass_count: "{{ pat_case_summary | selectattr('status', 'equalto', 'PASS') | list | length }}"
    pat_failed_count: "{{ pat_case_summary | selectattr('status', 'equalto', 'FAILED') | list | length }}"
    pat_na_count: "{{ pat_case_summary | selectattr('status', 'equalto', 'N/A') | list | length }}"
    pat_total_count: "{{ pat_case_summary | length }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Write PAT JSON report
  copy:
    dest: "{{ pat_output_dir }}/{{ pat_report_prefix }}.json"
    mode: "0640"
    content: "{{ {'run_id': pat_run_id, 'inventory_topology': {'masters': pat_master_hosts, 'workers': pat_worker_hosts, 'cluster_hosts': pat_cluster_hosts, 'master_count': pat_master_hosts | length, 'worker_count': pat_worker_hosts | length, 'cluster_host_count': pat_cluster_hosts | length}, 'usage': {'app_namespaces': pat_usage_app_namespaces | default(''), 'pvc_storage_classes': pat_usage_pvc_storage_classes | default(''), 'nad_references': pat_usage_nad_references | default(''), 'networkpolicy_count': pat_usage_networkpolicy_count | default(0) | int, 'hpa_count': pat_usage_hpa_count | default(0) | int, 'pdb_count': pat_usage_pdb_count | default(0) | int, 'ingress_count': pat_usage_ingress_count | default(0) | int, 'gateway_count': pat_usage_gateway_count | default(0) | int}, 'summary': {'cases': {'total': pat_total_count | int, 'pass': pat_pass_count | int, 'failed': pat_failed_count | int, 'na': pat_na_count | int}, 'assertions': {'total': pat_assertion_total_count | int, 'pass': pat_assertion_pass_count | int, 'failed': pat_assertion_failed_count | int, 'na': pat_assertion_na_count | int}}, 'case_summary': pat_case_summary, 'results': pat_all_results} | to_nice_json }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Write PAT Markdown report
  template:
    src: report.md.j2
    dest: "{{ pat_output_dir }}/{{ pat_report_prefix }}.md"
    mode: "0640"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Show PAT summary
  debug:
    msg:
      - "PAT report: {{ pat_output_dir }}/{{ pat_report_prefix }}.md"
      - "total={{ pat_total_count }} pass={{ pat_pass_count }} failed={{ pat_failed_count }} n/a={{ pat_na_count }}"
  when: inventory_hostname == pat_bootstrap_master
  tags:
    - pat
    - report

- name: Fail play when configured and PAT has failed cases
  fail:
    msg: "PAT has {{ pat_failed_count }} failed case(s). See {{ pat_output_dir }}/{{ pat_report_prefix }}.md"
  when:
    - inventory_hostname == pat_bootstrap_master
    - pat_fail_play_on_failed_cases | bool
    - (pat_failed_count | int) > 0
  tags:
    - pat
    - report
