---
- name: Validate kubeadm join commands are available on join nodes
  assert:
    that:
      - control_join is defined
      - worker_join is defined
    fail_msg: "kubeadm join commands are missing on {{ inventory_hostname }}. Check that kubeadm init generated and published control_join/worker_join on {{ groups['master'][0] }}."
    success_msg: "kubeadm join commands are available on {{ inventory_hostname }}."
  when:
    - "'kubeadm' in k8s_install_services"
    - inventory_hostname != groups['master'][0]

- name: Join remaining control-plane and worker nodes to cluster with failure log tail
  block:
    - name: Join remaining control-plane and worker nodes to cluster
      shell: |
        set -Eeuo pipefail
        cat > /root/join-cluster.sh <<'EOF'
        set -Eeuo pipefail
        log() { echo "[$(date '+%F %T')] $*"; }
        fail() {
            local rc=$?
            local line="${BASH_LINENO[0]:-${LINENO}}"
            echo "[ERROR] ${BASH_SOURCE[1]:-${BASH_SOURCE[0]}} failed at line ${line}: ${BASH_COMMAND} rc=${rc}" >&2
            exit "$rc"
        }
        trap fail ERR
        log "Starting kubeadm join"
        if [[ -f /etc/kube-master-metadata ]]; then
          {{ control_join }} --apiserver-advertise-address {{ k8s_ip }}
        else
          {{ worker_join }}
        fi
        log "Completed kubeadm join"
        EOF
        bash /root/join-cluster.sh 2>&1 | tee {{ __bootstrap_dir }}/logs/join-cluster.{{ __session_time }}.log
      args:
        executable: /bin/bash
  rescue:
    - name: Read kubeadm join log tail after failure
      shell: tail -n 120 {{ __bootstrap_dir }}/logs/join-cluster.{{ __session_time }}.log
      register: __join_cluster_log_tail
      failed_when: false
      args:
        executable: /bin/bash
    - name: Show kubeadm join log tail
      debug:
        var: __join_cluster_log_tail.stdout_lines
    - name: Fail kubeadm join with log path
      fail:
        msg: "join-cluster.sh failed. See {{ __bootstrap_dir }}/logs/join-cluster.{{ __session_time }}.log"
  when:
    - "'kubeadm' in k8s_install_services"
    - inventory_hostname != groups['master'][0]
