---
- name: Stop Keepalived when HA setup is disabled
  systemd:
    name: keepalived
    state: stopped
    enabled: false
  failed_when: false
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - not (setup_ha | default(true) | bool)

- name: Set Keepalived runtime facts
  set_fact:
    __keepalived_bootstrap_master: "{{ groups['k8s-master'][0] }}"
    __keepalived_vrrp_router_id_setting: "{{ keepalived_vrrp_router_id | default('auto') | string | lower }}"
    __keepalived_vrrp_router_id_state_file: "{{ __bootstrap_dir }}/state/keepalived_vrrp_router_id"
  when:
    - "'keepalived' in k8s_install_services"

- name: Validate Keepalived VRRP settings
  assert:
    that:
      - __keepalived_vrrp_router_id_setting == 'auto' or ((keepalived_vrrp_router_id | string | regex_search('^([1-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$')) is not none)
      - (keepalived_vip_prefix | default(24) | int >= 1) and (keepalived_vip_prefix | default(24) | int <= 32)
      - "'/' not in (k8s_master_ip | string)"
      - (keepalived_priority_base | int) >= (groups['k8s-master'] | length)
      - (keepalived_priority_base | int) <= 254
    fail_msg: >-
      Invalid Keepalived VRRP settings. keepalived_vrrp_router_id must be
      'auto' or an integer from 1 to 255, keepalived_vip_prefix must be from
      1 to 32, k8s_master_ip must be a plain IP without CIDR, and
      keepalived_priority_base must be from the number of masters through 254.
  run_once: true
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool

- name: Create Keepalived state directory on bootstrap master
  file:
    path: "{{ __keepalived_vrrp_router_id_state_file | dirname }}"
    state: directory
    mode: '0755'
  run_once: true
  delegate_to: "{{ __keepalived_bootstrap_master }}"
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting == 'auto'

- name: Check generated Keepalived VRRP router ID state
  stat:
    path: "{{ __keepalived_vrrp_router_id_state_file }}"
  register: __keepalived_vrrp_router_id_state
  run_once: true
  delegate_to: "{{ __keepalived_bootstrap_master }}"
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting == 'auto'

- name: Generate Keepalived VRRP router ID once on bootstrap master
  copy:
    dest: "{{ __keepalived_vrrp_router_id_state_file }}"
    content: "{{ range(1, 256) | random }}\n"
    mode: '0644'
  run_once: true
  delegate_to: "{{ __keepalived_bootstrap_master }}"
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting == 'auto'
    - not __keepalived_vrrp_router_id_state.stat.exists

- name: Read generated Keepalived VRRP router ID
  slurp:
    src: "{{ __keepalived_vrrp_router_id_state_file }}"
  register: __keepalived_vrrp_router_id_slurp
  run_once: true
  delegate_to: "{{ __keepalived_bootstrap_master }}"
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting == 'auto'

- name: Share generated Keepalived VRRP router ID with master nodes
  set_fact:
    __keepalived_vrrp_router_id: "{{ __keepalived_vrrp_router_id_slurp.content | b64decode | trim | int }}"
  loop: "{{ groups['k8s-master'] }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  run_once: true
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting == 'auto'

- name: Share configured Keepalived VRRP router ID with master nodes
  set_fact:
    __keepalived_vrrp_router_id: "{{ keepalived_vrrp_router_id | int }}"
  loop: "{{ groups['k8s-master'] }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  run_once: true
  when:
    - "'keepalived' in k8s_install_services"
    - setup_ha | default(true) | bool
    - __keepalived_vrrp_router_id_setting != 'auto'

- name: Validate effective Keepalived VRRP router ID on master nodes
  assert:
    that:
      - __keepalived_vrrp_router_id | int >= 1
      - __keepalived_vrrp_router_id | int <= 255
    fail_msg: "Effective Keepalived VRRP router ID must be from 1 to 255."
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Install Keepalived package on master nodes
  package:
    name: keepalived
    state: present
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Create Keepalived config fragment directory
  file:
    path: "{{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}"
    state: directory
    mode: '0755'
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Check existing Keepalived main config
  stat:
    path: /etc/keepalived/keepalived.conf
  register: __keepalived_main_config
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Read existing Keepalived main config
  slurp:
    src: /etc/keepalived/keepalived.conf
  register: __keepalived_main_config_slurp
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
    - __keepalived_main_config.stat.exists

- name: Detect legacy k8s_auto Keepalived main config
  set_fact:
    __keepalived_legacy_k8s_auto_main_config: >-
      {{
        (__keepalived_main_config_slurp.content | default('') | b64decode)
        is search('vrrp_instance[[:space:]]+')
        and
        (__keepalived_main_config_slurp.content | default('') | b64decode)
        is search(k8s_master_ip | regex_escape)
      }}
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
    - __keepalived_main_config.stat.exists

- name: Warn when migrating Kubernetes VIP out of Keepalived main config
  debug:
    msg: >-
      WARNING: /etc/keepalived/keepalived.conf already contains Kubernetes VIP
      {{ k8s_master_ip }}. The role will replace the main file with a base
      include-only config and keep the Kubernetes VIP only in
      {{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}/{{ keepalived_k8s_fragment_name | default('k8s-apiserver-vip.conf') }}
      to avoid duplicate VRRP/VIP definitions.
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
    - __keepalived_legacy_k8s_auto_main_config | default(false) | bool

- name: Create Keepalived main config when absent or legacy k8s_auto config is detected
  copy:
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
    content: |
      ! /etc/keepalived/keepalived.conf
      ! Base Keepalived configuration managed by k8s_auto when no prior config exists.

      global_defs {
          enable_script_security
          router_id K8S_AUTO
      }

      include {{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}/*.conf
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
    - not __keepalived_main_config.stat.exists or (__keepalived_legacy_k8s_auto_main_config | default(false) | bool)

- name: Ensure Keepalived main config includes fragments
  lineinfile:
    path: /etc/keepalived/keepalived.conf
    line: "include {{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}/*.conf"
    insertafter: EOF
    state: present
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
    - __keepalived_main_config.stat.exists
    - not (__keepalived_legacy_k8s_auto_main_config | default(false) | bool)

- name: Remove stale Keepalived Kubernetes API config fragment
  file:
    path: "{{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}/kubernetes.conf"
    state: absent
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Render Keepalived Kubernetes API VIP fragment
  template:
    src: keepalived.conf.j2
    dest: "{{ keepalived_conf_dir | default('/etc/keepalived/conf.d') }}/{{ keepalived_k8s_fragment_name | default('k8s-apiserver-vip.conf') }}"
    mode: '0644'
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Render Keepalived Kubernetes API health check
  template:
    src: check_apiserver.sh.j2
    dest: "{{ keepalived_k8s_check_script_path | default('/etc/keepalived/check_k8s_apiserver.sh') }}"
    mode: '0755'
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Validate Keepalived configuration
  command:
    argv:
      - keepalived
      - -t
      - -f
      - /etc/keepalived/keepalived.conf
  changed_when: false
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool

- name: Start Keepalived VIP service
  systemd:
    name: keepalived
    state: restarted
    enabled: true
  when:
    - "'keepalived' in k8s_install_services"
    - "'k8s-master' in group_names"
    - setup_ha | default(true) | bool
