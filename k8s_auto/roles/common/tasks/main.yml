---
- name: Build image pull list from selected services and network options
  tags: ["dryrun"]
  set_fact:
    container_images: >-
      {{
        core_images + operation_images
        + ( calico_images if cni_prime == 'calico'
        else cilium_images if cni_prime == 'cilium'
        else calico_images )
        + (multus_images if multi_network | bool else [] )
        + exporter_images
      }}

- tags: ["debug", "dryrun"]
  debug:
    var: container_images

- name: Build manifest render list for dry-run visibility
  tags: ["dryrun"]
  set_fact:
    list_init_files: >-
      {{
        kubeadm_init
        + (calico_init if cni_prime == 'calico'
        else cilium_init if cni_prime == 'cilium'
        else calico_init )
        + coredns_init
        + etcd_operation
        + (multus_init if multi_network | bool else [])
        + (whereabouts_init if multi_network | bool else [])
        + (macvlan_init if (multi_network | bool and multus_macvlan | bool) else [] )
        + (sriov_init if multus_sriov | bool else [] )
        + ['metric-server-v0.8.0.yaml.j2', 'kube-state-metrics.yaml.j2']
        + (['kubelet-csr-approver.yaml.j2'] if kubelet_serverTLSBootstrap | default(false) | bool else [])
        + kyverno_init
      }}

- tags: ["debug", "dryrun"]
  debug:
    var: list_init_files

- name: Render common node bootstrap script
  tags: ["dryrun"]
  template:
    src: common-bootstrap.sh.j2
    dest: /root/kube-common-bootstrap.sh
    mode: '0755'
  when:
    - "'common' in k8s_install_services"
    - common_bootstrap_enabled | default(false) | bool

- name: Run common node bootstrap script with failure log tail
  block:
    - name: Run common node bootstrap script
      shell: |
        set -Eeuo pipefail
        bash /root/kube-common-bootstrap.sh 2>&1 | tee {{ __bootstrap_dir }}/logs/common-bootstrap.{{ __session_time }}.log
      args:
        executable: /bin/bash
  rescue:
    - name: Read common bootstrap log tail after failure
      shell: tail -n 120 {{ __bootstrap_dir }}/logs/common-bootstrap.{{ __session_time }}.log
      register: __common_bootstrap_log_tail
      failed_when: false
      args:
        executable: /bin/bash
    - name: Show common bootstrap log tail
      debug:
        var: __common_bootstrap_log_tail.stdout_lines
    - name: Fail common bootstrap with log path
      fail:
        msg: "common-bootstrap.sh failed. See {{ __bootstrap_dir }}/logs/common-bootstrap.{{ __session_time }}.log"
  when:
    - "'common' in k8s_install_services"
    - common_bootstrap_enabled | default(false) | bool
    - __rerun_bootstrap is defined

- name: Create etcd client tools staging directory on master nodes
  file:
    path: "{{ __bootstrap_dir }}/etcd-tools"
    state: directory
  when:
    - "'common' in k8s_install_services"
    - "'master' in group_names"

- name: Copy etcd client tools archive to master nodes
  copy:
    src: etcd-v3.5.15-linux-amd64.tar.gz
    dest: "{{ __bootstrap_dir }}/etcd-tools/etcd-v3.5.15-linux-amd64.tar.gz"
    mode: '0644'
  when:
    - "'common' in k8s_install_services"
    - "'master' in group_names"

- name: Ensure tar is installed before extracting etcd client tools
  package:
    name: tar
    state: present
  when:
    - "'common' in k8s_install_services"
    - "'master' in group_names"

- name: Install etcdctl and etcdutl on master nodes
  shell: |
    set -Eeuo pipefail
    tar -xzf {{ __bootstrap_dir }}/etcd-tools/etcd-v3.5.15-linux-amd64.tar.gz \
      -C {{ __bootstrap_dir }}/etcd-tools \
      etcd-v3.5.15-linux-amd64/etcdctl \
      etcd-v3.5.15-linux-amd64/etcdutl
    install -m 0755 {{ __bootstrap_dir }}/etcd-tools/etcd-v3.5.15-linux-amd64/etcdctl /usr/local/bin/etcdctl
    install -m 0755 {{ __bootstrap_dir }}/etcd-tools/etcd-v3.5.15-linux-amd64/etcdutl /usr/local/bin/etcdutl
  args:
    creates: /usr/local/bin/etcdutl
    executable: /bin/bash
  when:
    - "'common' in k8s_install_services"
    - "'master' in group_names"

- name: Write etcdctl environment helper on master nodes
  copy:
    dest: /etc/profile.d/etcdctl.sh
    mode: '0644'
    content: |
      export ETCDCTL_API=3
      export ETCDCTL_ENDPOINTS=https://127.0.0.1:2379
      export ETCDCTL_CACERT=/etc/kubernetes/pki/etcd/ca.crt
      export ETCDCTL_CERT=/etc/kubernetes/pki/etcd/server.crt
      export ETCDCTL_KEY=/etc/kubernetes/pki/etcd/server.key
  when:
    - "'common' in k8s_install_services"
    - "'master' in group_names"
