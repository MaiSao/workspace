---
- name: create etcd backup/rotate/defrag cronjob, install metric server
  shell: |
      cat > /root/post-deploy.sh <<'EOF'
      kubectl apply \
        -f {{ __bootstrap_dir }}/etcd-backup-rotate-cronjob.yaml \
        -f {{ __bootstrap_dir }}/etcd-defrag.yaml \
        -f {{ __bootstrap_dir }}/metric-server-v0.8.0.yaml \
        -f {{ __bootstrap_dir }}/kube-state-metrics.yaml 
      EOF
      bash /root/post-deploy.sh | tee {{ __bootstrap_dir }}/logs/post-deploy.{{ __session_time }}.log
