---
- name: Create containerd configuration directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'
  when: "'containerd' in k8s_install_services"

- name: Render containerd CRI configuration
  tags: ["dryrun"]
  template:
    src: config.toml.j2
    dest: /etc/containerd/config.toml
  when: "'containerd' in k8s_install_services"

- name: Render containerd installation bootstrap script
  tags: ["dryrun"]
  template:
    src: containerd-bootstrap.sh.j2
    dest: /root/kube-containerd-bootstrap.sh
    mode: '0755'
  when: "'containerd' in k8s_install_services"

- name: Run containerd installation bootstrap script
  shell: |
    set -Eeuo pipefail
    bash /root/kube-containerd-bootstrap.sh | tee {{ __bootstrap_dir }}/logs/containerd-bootstrap.{{ __session_time }}.log
  args:
    executable: /bin/bash
  when: "'containerd' in k8s_install_services"
