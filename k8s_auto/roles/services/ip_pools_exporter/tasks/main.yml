---
- name: Render IP pools exporter manifest on bootstrap master
  template:
    src: ip-pools-exporter.yaml.j2
    dest: "{{ __bootstrap_dir }}/ip-pools-exporter.yaml"
  when:
    - "'ip_pools_exporter' in k8s_install_services"
    - multus_sriov | default(false) | bool
    - inventory_hostname == groups['master'][0]

- name: Apply IP pools exporter
  shell: |
    set -Eeuo pipefail
    kubectl apply -f {{ __bootstrap_dir }}/ip-pools-exporter.yaml
  args:
    executable: /bin/bash
  when:
    - "'ip_pools_exporter' in k8s_install_services"
    - multus_sriov | default(false) | bool
    - inventory_hostname == groups['master'][0]
