---
- name: Render kubelet CSR approver manifest on bootstrap master
  template:
    src: kubelet-csr-approver.yaml.j2
    dest: "{{ __bootstrap_dir }}/kubelet-csr-approver.yaml"
  when:
    - "'kubelet_csr_approver' in k8s_install_services"
    - kubelet_serverTLSBootstrap | default(false) | bool
    - inventory_hostname == groups['master'][0]

- name: Apply kubelet CSR approver
  shell: |
    set -Eeuo pipefail
    kubectl apply -f {{ __bootstrap_dir }}/kubelet-csr-approver.yaml
    kubectl -n kube-system rollout status deployment/kubelet-csr-approver --timeout=180s
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when:
    - "'kubelet_csr_approver' in k8s_install_services"
    - kubelet_serverTLSBootstrap | default(false) | bool
    - inventory_hostname == groups['master'][0]
