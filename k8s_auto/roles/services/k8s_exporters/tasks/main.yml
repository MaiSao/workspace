---
- name: Install snmpd package on nodes
  package:
    name: net-snmp
    state: present
  when:
    - "'exporters' in k8s_install_services"
    - k8s_exporters.snmp.enabled | default(false) | bool

- name: Create SNMP exporter host config directory
  file:
    path: /etc/snmp_exporter
    state: directory
  when:
    - "'exporters' in k8s_install_services"
    - k8s_exporters.snmp.enabled | default(false) | bool

- name: Install snmpd configuration on nodes
  copy:
    src: snmpd.conf
    dest: /etc/snmp/snmpd.conf
    mode: '0644'
  when:
    - "'exporters' in k8s_install_services"
    - k8s_exporters.snmp.enabled | default(false) | bool

- name: Install SNMP exporter module configuration on nodes
  copy:
    src: snmp.yml
    dest: /etc/snmp_exporter/snmp.yml
    mode: '0644'
  when:
    - "'exporters' in k8s_install_services"
    - k8s_exporters.snmp.enabled | default(false) | bool

- name: Start snmpd service on nodes
  service:
    name: snmpd
    state: restarted
    enabled: true
  when:
    - "'exporters' in k8s_install_services"
    - k8s_exporters.snmp.enabled | default(false) | bool

- name: Install HAProxy exporter package on master nodes
  package:
    name: "{{ k8s_exporters.haproxy.package_name }}"
    state: present
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.haproxy.enabled | default(false) | bool

- name: Install HAProxy exporter systemd unit on master nodes
  template:
    src: haproxy-exporter.service.j2
    dest: /etc/systemd/system/haproxy-exporter.service
    mode: '0644'
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.haproxy.enabled | default(false) | bool

- name: Start HAProxy exporter host service on master nodes
  systemd:
    name: haproxy-exporter
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.haproxy.enabled | default(false) | bool

- name: Install Keepalived exporter package on master nodes
  package:
    name: "{{ k8s_exporters.keepalived.package_name }}"
    state: present
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.keepalived.enabled | default(false) | bool

- name: Install Keepalived exporter systemd unit on master nodes
  template:
    src: keepalived-exporter.service.j2
    dest: /etc/systemd/system/keepalived-exporter.service
    mode: '0644'
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.keepalived.enabled | default(false) | bool

- name: Start Keepalived exporter host service on master nodes
  systemd:
    name: keepalived-exporter
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - "'exporters' in k8s_install_services"
    - "'master' in group_names"
    - k8s_exporters.keepalived.enabled | default(false) | bool

- name: Build enabled exporter manifest list
  set_fact:
    __exporter_manifest_files: >-
      {{
        ([] if not (k8s_exporters.cert.enabled | default(false) | bool) else ['cert-exporter.yaml.j2'])
        + ([] if not ((k8s_exporters.ip_pools.enabled | default(false) | bool) and (multus_sriov | default(false) | bool)) else ['ip-pools-exporter.yaml.j2'])
        + ([] if not (k8s_exporters.snmp.enabled | default(false) | bool) else ['snmp-exporter.yaml.j2'])
        + ([] if not (k8s_exporters.snmp_switch.enabled | default(false) | bool) else ['snmp-switch-exporter.yaml.j2'])
      }}
  when:
    - "'exporters' in k8s_install_services"
    - inventory_hostname == groups['master'][0]

- name: Render enabled exporter manifests on bootstrap master
  loop: "{{ __exporter_manifest_files }}"
  template:
    src: "{{ item }}"
    dest: "{{ __bootstrap_dir }}/{{ item | replace('.j2','') }}"
  when:
    - "'exporters' in k8s_install_services"
    - inventory_hostname == groups['master'][0]

- name: Apply enabled exporter manifests
  shell: |
    set -Eeuo pipefail
    {% for manifest_file in __exporter_manifest_files %}
    kubectl apply -f {{ __bootstrap_dir }}/{{ manifest_file | replace('.j2','') }}
    {% endfor %}
  args:
    executable: /bin/bash
  when:
    - "'exporters' in k8s_install_services"
    - inventory_hostname == groups['master'][0]
    - __exporter_manifest_files | length > 0
