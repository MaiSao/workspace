---
- name: Build add-on manifest list from enabled services
  set_fact:
    __addon_manifest_files: "{{ etcd_operation + ((add_on_self | list) if add_on_self is defined else []) }}"
  when:
    - inventory_hostname == groups['master'][0]
    - "'addons' in k8s_install_services"

- name: Render add-on manifests on bootstrap master
  loop: "{{ __addon_manifest_files }}"
  template:
    src: "{{ item }}"
    dest: "/root/kubebootstrap/{{ item | replace('.j2','') }}"
  when:
    - inventory_hostname == groups['master'][0]
    - "'addons' in k8s_install_services"

- name: Apply add-on manifests for etcd operations and observability
  shell: |
      set -Eeuo pipefail
      cat > /root/post-deploy.sh <<'EOF'
      set -Eeuo pipefail
      trap 'echo "[ERROR] post-deploy.sh failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR
      kubectl apply \
        -f {{ __bootstrap_dir }}/etcd-backup-rotate-cronjob.yaml \
        -f {{ __bootstrap_dir }}/etcd-defrag.yaml \
        -f {{ __bootstrap_dir }}/metric-server-v0.8.0.yaml \
        -f {{ __bootstrap_dir }}/kube-state-metrics.yaml \
        -f {{ __bootstrap_dir }}/kubelet-csr-approver.yaml
      kubectl apply -f {{ __bootstrap_dir }}/kyverno-v1.14.4.yaml
      kubectl wait --for=condition=established crd/clusterpolicies.kyverno.io --timeout=120s
      kubectl wait --for=condition=available deployment -n kyverno --all --timeout=300s
      kubectl apply \
        -f {{ __bootstrap_dir }}/kyverno-block-specific-nodeports.yaml \
        -f {{ __bootstrap_dir }}/kyverno-require-run-as-nonroot.yaml \
        -f {{ __bootstrap_dir }}/kyverno-pod-resources-request-limit-block.yaml
      EOF
      bash /root/post-deploy.sh | tee {{ __bootstrap_dir }}/logs/post-deploy.{{ __session_time }}.log
  args:
    executable: /bin/bash
  when:
    - inventory_hostname == groups['master'][0]
    - "'addons' in k8s_install_services"
