---
- name: Install HAProxy package on master nodes
  package:
    name: haproxy
    state: present
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Allow HAProxy to connect to Kubernetes API backends
  shell: |
    set -Eeuo pipefail
    setsebool -P haproxy_connect_any=1 || true
    semanage port -a -t http_port_t -p tcp {{ ha_apiserver_port }} || true
  args:
    executable: /bin/bash
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Remove stale HAProxy Kubernetes API config fragments
  loop:
    - kubernetes.cfg
    - apiserver.cfg
    - kube-apiserver.cfg
  file:
    path: "/etc/haproxy/conf.d/{{ item }}"
    state: absent
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Render HAProxy Kubernetes API load balancer config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Validate HAProxy configuration
  shell: |
    set -Eeuo pipefail
    if [[ -d /etc/haproxy/conf.d ]]; then
      haproxy -c -f /etc/haproxy/haproxy.cfg -f /etc/haproxy/conf.d
    else
      haproxy -c -f /etc/haproxy/haproxy.cfg
    fi
  args:
    executable: /bin/bash
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Start HAProxy Kubernetes API load balancer
  systemd:
    name: haproxy
    state: restarted
    enabled: true
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"

- name: Mark node as Kubernetes control-plane candidate
  copy:
    dest: /etc/kube-master-metadata
    content: "KubeMaster\n"
    mode: '0644'
  when:
    - "'haproxy' in k8s_install_services"
    - "'master' in group_names"
