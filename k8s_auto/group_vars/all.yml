#===============================================================================
# OPERATOR SETTINGS
# Review this section before every installation.
# Each inventory host must define k8s_ip explicitly; ansible_host is only the
# SSH management address and may use a different network.
#===============================================================================

#---------------------------------------------------
# Cluster identity
#---------------------------------------------------
k8s_version: v1.31.4
clusterName: kubernetes
networking_dnsDomain: cluster.local

# Allow workloads to run on control-plane nodes after all masters have joined.
master_hybrid: true

#---------------------------------------------------
# Cluster networking
#---------------------------------------------------
networking_podSubnet: 192.168.0.0/16
networking_serviceSubnet: 10.96.0.0/12
ip_autodetection_method_cidr: 172.20.3.0/24

# Primary and optional secondary CNI features.
cni_prime: calico
multi_network: true
multus_macvlan: true
multus_sriov: false

#---------------------------------------------------
# Kubernetes API high availability
#---------------------------------------------------
# false skips HAProxy, Keepalived, and their exporters.
setup_ha: true
k8s_master_ip: 172.20.3.155
ha_apiserver_port: 8443
interface_k8s: eth0

# Keepalived values shared by every control-plane node.
keepalived_auth_pass: "3333"
keepalived_vip_prefix: 24
# auto generates one persistent value for the cluster; alternatively use 1-255.
keepalived_vrrp_router_id: auto
# The first k8s-master uses this priority; every following master decrements by
# one, regardless of cluster size. Keep below 255 because 255 is reserved for
# the VRRP address owner. An odd control-plane count is recommended for etcd.
keepalived_priority_base: 200

#---------------------------------------------------
# Container registry
#---------------------------------------------------
registry_protocol: http
registry_ip: 172.20.3.71
registry_name: docker-registry
registry_port: 4000

#---------------------------------------------------
# Operating-system package repository
#---------------------------------------------------
repo_protocol: http
repo_ip: 172.20.3.71
repo_name: repository
repo_port: 8080

#---------------------------------------------------
# Data paths and installation behavior
#---------------------------------------------------
k8s_auditlog_dir: /u01/k8saudit
etcd_backup_dir: /u01/etcdbackup
etcdDataDir: /u01/etcd/
containerd_root_dir: /u01/containerd

# Users on control-plane nodes that receive ~/.kube/config.
master_user: ["root", "vt_admin"]

# Bootstrap is destructive on existing Kubernetes nodes. Review before reruns.
common_bootstrap_enabled: true
__rerun_bootstrap: true
__bootstrap_dir: /root/kubebootstrap

#===============================================================================
# OPTIONAL KUBERNETES DEFAULTS
# Normal installations can keep the values below unchanged.
#===============================================================================

#---------------------------------------------------
# Container runtime and kubeadm
#---------------------------------------------------
containerd_sandbox_image: registry.k8s.io/pause:3.10
criSocket: "unix:///run/containerd/containerd.sock"
certificatesDir: /etc/kubernetes/pki

certificateValidityPeriod: 876000h
caCertificateValidityPeriod: 876000h

feature_gates:
  EtcdLearnerMode: false

#---------------------------------------------------
# API server, controller manager, and scheduler
#---------------------------------------------------
apiserver_audit_log_maxage: 30
apiserver_audit_log_maxbackup: 10
apiserver_audit_log_maxsize: 100

apiserver_authorization_mode: Node,RBAC
apiserver_event_ttl: 168h
apiserver_kubelet_preferred_address_types: InternalDNS,InternalIP,Hostname,ExternalDNS,ExternalIP
apiserver_service_node_port_range: 100-50000
apiserver_timeoutForControlPlane: 4m0s
apiserver_profiling: false

controllerManager_cluster_signing_duration: 876000h
controllerManager_terminated_pod_gc_threshold: 555
controllerManager_profiling: false
controllerManager_bind_address: 0.0.0.0

scheduler_bind_address: 0.0.0.0
scheduler_profiling: false
dns_type: CoreDNS

#---------------------------------------------------
# Kubelet and kube-proxy
#---------------------------------------------------
kubelet_healthzBindAddress: 0.0.0.0
kubelet_healthzPort: 10248
kubelet_readOnlyPort: 10255
kubelet_imageGCHighThresholdPercent: 85
kubelet_imageGCLowThresholdPercent: 80
kubelet_evictionHard: |-
  memory.available: "100Mi"
  nodefs.available: "5%"
  nodefs.inodesFree: "5%"
  imagefs.available: "10%"

kubelet_kubeReserved: |-
  cpu: "300m"
  memory: "512Mi"
kubelet_systemReserved: |-
  cpu: "200m"
  memory: "512Mi"
kubelet_serverTLSBootstrap: true
kubelet_reservedSystemCPUs: ""

kubeproxy_bindAddress: 0.0.0.0
kubeproxy_healthzBindAddress: 0.0.0.0:10256
kubeproxy_metricsBindAddress: 0.0.0.0:10249

#---------------------------------------------------
# Repository definitions
#---------------------------------------------------
os_repositories:
  - id: rhel89baseos
    name: rhel89baseos
    baseurl: "{{ repo_protocol }}://{{ repo_name }}:{{ repo_port }}/rhel89/BaseOS/"
    enabled: 1
    gpgcheck: 0
  - id: rhel89appstream
    name: rhel89appstream
    baseurl: "{{ repo_protocol }}://{{ repo_name }}:{{ repo_port }}/rhel89/AppStream/"
    enabled: 1
    gpgcheck: 0
  - id: epel8
    name: epel8
    baseurl: "{{ repo_protocol }}://{{ repo_name }}:{{ repo_port }}/epel8"
    enabled: 1
    gpgcheck: 0
  - id: docker-ce
    name: docker-ce
    baseurl: "{{ repo_protocol }}://{{ repo_name }}:{{ repo_port }}/docker-ce-rh8"
    enabled: 1
    gpgcheck: 0
  - id: kubernetes
    name: Kubernetes
    baseurl: "{{ repo_protocol }}://{{ repo_name }}:{{ repo_port }}/k8s-rh8"
    enabled: 1
    gpgcheck: 0

#===============================================================================
# DERIVED VALUES
# These are calculated from operator settings and normally do not need edits.
#===============================================================================
k8s_master_hosts: "{{ groups.get('k8s-master', []) }}"
k8s_worker_hosts: "{{ groups.get('k8s-worker', []) }}"
k8s_cluster_hosts: "{{ (k8s_master_hosts + k8s_worker_hosts) | unique | list }}"
k8s_bootstrap_master: "{{ k8s_master_hosts | first }}"
localAPIEndpointAddress: "{{ hostvars[k8s_bootstrap_master]['k8s_ip'] }}"
localAPIEndpointPort: 6443
imageRepositoryProject: registry.k8s.io
__registry_prefix: "{{ registry_name }}:{{ registry_port }}"
apiserver_kubelet_certificate_authority: "{{ certificatesDir }}/ca.crt"
