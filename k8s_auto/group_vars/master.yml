---
#---------------------------------------------------
# Control-plane static pod resource sizing
#---------------------------------------------------
# These values are used by roles/k8s_patch to update static pod manifests under:
# /etc/kubernetes/manifests/
#
# Requests reserve capacity for scheduling and node pressure decisions.
# Limits cap maximum usage. Tune these for node size, expected cluster scale, and
# production performance requirements.
#---------------------------------------------------

# etcd resource requests and limits.
etcd_requests_cpu: "100m"
etcd_requests_memory: "128Mi"
etcd_limits_cpu: "2"
etcd_limits_memory: "4Gi"

# kube-apiserver resource requests and limits.
apiserver_requests_cpu: "100m"
apiserver_requests_memory: "128Mi"
apiserver_limits_cpu: "2"
apiserver_limits_memory: "4Gi"

# kube-controller-manager resource requests and limits.
controller_manager_requests_cpu: "100m"
controller_manager_requests_memory: "128Mi"
controller_manager_limits_cpu: "2"
controller_manager_limits_memory: "4Gi"

# kube-scheduler resource requests and limits.
scheduler_requests_cpu: "100m"
scheduler_requests_memory: "128Mi"
scheduler_limits_cpu: "2"
scheduler_limits_memory: "4Gi"
