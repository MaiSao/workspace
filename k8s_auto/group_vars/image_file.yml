#---------------------------------------------------
# Image and manifest checklist variables
#---------------------------------------------------
# These lists drive two things:
# 1. which images are pre-pulled by kubeadm_control_plane
# 2. which templates are rendered by kubeadm_prepare, services/k8s_cni,
#    and services/k8s_addons
#
# When changing a component version, update both its image variable and matching
# template filename if the manifest is version-specific.
#---------------------------------------------------

#---------------------------------------------------
# Named image variables
#---------------------------------------------------
# Edit these values when changing image repositories or versions. Image lists
# and rendered Kubernetes manifests reference these variables, so one change here
# updates both the pre-pull checklist and applied YAML.
cilium_image: cilium/cilium:1.18.5
calico_cni_image: calico/cni:v3.28.2
calico_kube_controllers_image: calico/kube-controllers:v3.28.2
calico_node_image: calico/node:v3.28.2
whereabouts_image: vht/ocs/whereabouts:0.5.4-22-d05f10dc
multus_cni_image: k8snetworkplumbingwg/multus-cni:v4.1.3
sriov_device_plugin_image: k8snetworkplumbingwg/sriov-network-device-plugin:v3.8.0
kubectl_image: bitnami/kubectl:1.30.1
etcd_backup_image: registry.k8s.io/etcd-backup:3.5.15
etcd_image: registry.k8s.io/etcd:3.5.15-0
metrics_server_image: k8s.gcr.io/metrics-server/metrics-server:v0.8.0
kube_state_metrics_image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.14.0
coredns_image: registry.k8s.io/coredns:v1.11.3
kube_apiserver_image: "registry.k8s.io/kube-apiserver:{{ k8s_version }}"
kube_controller_manager_image: "registry.k8s.io/kube-controller-manager:{{ k8s_version }}"
kube_proxy_image: "registry.k8s.io/kube-proxy:{{ k8s_version }}"
kube_scheduler_image: "registry.k8s.io/kube-scheduler:{{ k8s_version }}"
pause_image: registry.k8s.io/pause:3.10

# Images for optional Cilium support. Note: cni_prime: cilium also needs a
# cilium_init template list and matching template before it can be used safely.
cilium_images:
  - "{{ cilium_image }}"

# Calico images for the default primary CNI.
calico_images:
  - "{{ calico_cni_image }}"
  - "{{ calico_kube_controllers_image }}"
  - "{{ calico_node_image }}"

# Multus and Whereabouts images used when multi_network: true.
multus_images:
  - "{{ whereabouts_image }}"
  - "{{ multus_cni_image }}"

# Operational add-on images used by services/k8s_addons.
operation_images:
  - "{{ etcd_backup_image }}"
  - "{{ metrics_server_image }}"
  - "{{ kube_state_metrics_image }}"

# Core Kubernetes images. k8s_version comes from group_vars/all.yml.
core_images:
  - "{{ coredns_image }}"
  - "{{ etcd_image }}"
  - "{{ kube_apiserver_image }}"
  - "{{ kube_controller_manager_image }}"
  - "{{ kube_proxy_image }}"
  - "{{ kube_scheduler_image }}"
  - "{{ pause_image }}"

#---------------------------------------------------
# Template file lists
#---------------------------------------------------
# File names must exist under the owning role's templates/ directory.
# kubeadm_init: roles/kubeadm_prepare/templates/
# calico_init, coredns_init, multus_init, sriov_init:
#   roles/services/k8s_cni/templates/
# etcd_operation, add_on_self:
#   roles/services/k8s_addons/templates/
#---------------------------------------------------

# kubeadm bootstrap configuration rendered before kubeadm init.
kubeadm_init:
  - kubeadm-config.yaml.j2

# Primary Calico manifest rendered when cni_prime: calico.
calico_init:
  - calico-v3.28.2.yaml.j2

# CoreDNS override and NodePort service manifest.
coredns_init:
  - coredns.yaml.j2

# etcd operational CronJobs rendered by services/k8s_addons.
etcd_operation:
  - etcd-backup-rotate-cronjob.yaml.j2
  - etcd-defrag.yaml.j2

# Multus and Whereabouts manifests rendered when multi_network: true.
multus_init:
  - multus-daemonset_v4.1.3.yaml.j2
  - whereabouts_daemonset_install.yaml.j2
  - whereabouts_ippools-cleaner.yaml.j2
  - whereabouts_ippools.yaml.j2

# SR-IOV manifests rendered when multus_sriov: true.
sriov_init:
  - sriov_configMap.yaml.j2
  - sriovdp-daemonsetv3.8.0.yaml.j2
  - whereabouts-net-sriov-bond.yaml.j2

# Additional cluster add-ons rendered by services/k8s_addons.
add_on_self:
  - kube-state-metrics.yaml.j2
  - metric-server-v0.8.0.yaml.j2
