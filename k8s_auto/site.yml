---
- name: Install Kubernetes cluster
  hosts: k8s-master, k8s-worker
  gather_facts: true
  vars_files:
    - group_vars/all.yml
    - group_vars/images.yml
    - group_vars/services.yml
    - group_vars/resources.yml
  roles:
    # Preflight
    - role: cluster_preflight
      tags: [always, preflight]

    # Base
    - role: common
      when: "'common' in k8s_install_services"
      tags: [common]

    - role: containerd
      when: "'containerd' in k8s_install_services"
      tags: [containerd]

    # HA
    - role: haproxy
      when: "'haproxy' in k8s_install_services"
      tags: [haproxy]

    - role: keepalived
      when: "'keepalived' in k8s_install_services"
      tags: [keepalived]

    # Cluster bootstrap
    - role: kubeadm
      when: "'kubeadm' in k8s_install_services"
      tags: [kubeadm]

    # Primary and secondary CNI
    - role: calico
      when: "'calico' in k8s_install_services"
      tags: [calico]

    - role: multus
      when: "'multus' in k8s_install_services"
      tags: [multus]

    - role: whereabouts
      when: "'whereabouts' in k8s_install_services"
      tags: [whereabouts]

    - role: sriov
      when:
        - multi_network | bool
        - multus_sriov | bool
      tags: [sriov]

    - role: macvlan
      when:
        - multi_network | bool
        - multus_macvlan | bool
      tags: [macvlan]

    # Cluster add-ons
    - role: coredns
      when: "'coredns' in k8s_install_services"
      tags: [coredns]

    - role: metrics_server
      when: "'metrics_server' in k8s_install_services"
      tags: [metrics_server]

    - role: kube_state_metrics
      when: "'kube_state_metrics' in k8s_install_services"
      tags: [kube_state_metrics]

    - role: kubelet_csr_approver
      when: "'kubelet_csr_approver' in k8s_install_services"
      tags: [kubelet_csr_approver]

    - role: kyverno
      when: "'kyverno' in k8s_install_services"
      tags: [kyverno]

    - role: etcd_jobs
      when: "'etcd_jobs' in k8s_install_services"
      tags: [etcd_jobs]

    # Observability
    - role: cert_exporter
      when: "'cert_exporter' in k8s_install_services"
      tags: [cert_exporter]

    - role: snmp_exporter
      when: "'snmp_exporter' in k8s_install_services"
      tags: [snmp_exporter]

    - role: snmp_switch_exporter
      when: "'snmp_switch_exporter' in k8s_install_services"
      tags: [snmp_switch_exporter]

    - role: haproxy_exporter
      when: "'haproxy_exporter' in k8s_install_services"
      tags: [haproxy_exporter]

    - role: keepalived_exporter
      when: "'keepalived_exporter' in k8s_install_services"
      tags: [keepalived_exporter]

    - role: ip_pools_exporter
      when: "'ip_pools_exporter' in k8s_install_services"
      tags: [ip_pools_exporter]

    # Extra services
    - role: fluentbit
      when:
        - "'fluentbit' in k8s_install_extra_services"
        - inventory_hostname == groups['k8s-master'][0]
      tags: [extra_services, fluentbit]

    - role: local_path_provisioner
      when:
        - "'local_path_provisioner' in k8s_install_extra_services"
        - inventory_hostname == groups['k8s-master'][0]
      tags: [extra_services, local_path_provisioner]

    - role: elasticsearch
      when:
        - "'elasticsearch' in k8s_install_extra_services"
        - inventory_hostname == groups['k8s-master'][0]
      tags: [extra_services, elasticsearch]

    # Post-install tuning must run last.
    - role: k8s_tuning
      when: "'k8s_tuning' in k8s_install_services"
      tags: [tuning]
