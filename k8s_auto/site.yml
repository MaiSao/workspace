---
- name: Install Kubernetes cluster
  hosts: all
  gather_facts: yes
  vars_files:
    - group_vars/all.yml
    - group_vars/images.yml
    - group_vars/services.yml
  roles:
    - role: common
      vars:
        common_bootstrap_enabled: true
      tags: common
    - role: containerd
      tags: containerd
    - role: k8s_ha
      tags: k8s_ha
    - role: kubeadm_prepare
      tags: kubeadm_prepare
    - role: kubeadm_control_plane
      tags: kubeadm_control_plane
    - role: kubeconfig
      tags: kubeconfig
    - role: services/k8s_cni
      tags: cni
    - role: kubeadm_join
      tags: kubeadm_join
    - role: services/k8s_addons
      tags: addons
    - role: k8s_patch
      tags: k8s_patch
