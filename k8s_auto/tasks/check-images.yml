---
- name: Normalize image preflight list for {{ image_check_name }}
  set_fact:
    __image_preflight_images: "{{ image_check_images | default([]) | flatten | unique | list }}"

- name: Check required images before installing {{ image_check_name }}
  loop: "{{ __image_preflight_images }}"
  loop_control:
    loop_var: image_check_image
    label: "{{ __registry_prefix }}/{{ image_check_image }}"
  shell: |
    set -Eeuo pipefail
    crictl pull {{ (__registry_prefix ~ '/' ~ image_check_image) | quote }}
  args:
    executable: /bin/bash
  changed_when: false
  when: __image_preflight_images | length > 0
