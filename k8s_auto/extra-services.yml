---
- name: Install selected extra Kubernetes services
  hosts: "{{ k8s_services_host | default('master[0]') }}"
  gather_facts: yes
  vars_files:
    - group_vars/all.yml
    - group_vars/images.yml
    - group_vars/services.yml
    - group_vars/resources.yml
  tasks:
    - name: Install enabled extra service roles
      include_role:
        name: "{{ item.role }}"
      loop: "{{ k8s_enabled_extra_services }}"
      when: item.enabled | default(true) | bool
      tags: extra_services
