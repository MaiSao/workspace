---
- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  ignore_errors: yes
- name: Install Docker if not installed
  yum:
    name: 
      - docker-ce
      - docker-ce-cli
    state: present
  when: docker_check.rc != 0

- name: Start and enable Docker if not running
  service:
    name: docker
    state: started
    enabled: yes
  when: docker_check.rc != 0

- name: Copy docker daemon.json to config docker
  template:
    src: daemon.json.j2
    dest: "/etc/docker/daemon.json"
    mode: '0755'

- name: Create docker directory if not exists
  file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Copy Docker-compose to remote node
  copy:
    src: files/docker-compose
    dest: "/usr/bin/docker-compose"
    owner: root
    group: root
    mode: '0755'

- name: Ensure temp certificate directory exists
  file:
    path: "/tmp/harbor"
    state: directory
    mode: '0755'

- name: Fetch certificates from primary node
  ansible.builtin.fetch:
    src: "/tmp/harbor/{{ item }}"
    dest: "/tmp/"
    flat: yes
  delegate_to: "{{ primary_harbor_node }}"
  with_items:
    - "{{ harbor_domain }}.cert"
    - "{{ harbor_domain }}.crt"
    - "{{ harbor_domain }}.pem"
    - "{{ harbor_domain }}.key"
    - "ca.crt"
- name: Copy certificates to each node
  ansible.builtin.copy:
    src: "/tmp/{{ item }}"
    dest: "/tmp/harbor/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  with_items:
    - "{{ harbor_domain }}.cert"
    - "{{ harbor_domain }}.crt"
    - "{{ harbor_domain }}.pem"
    - "{{ harbor_domain }}.key"
    - "ca.crt"

- name: Copy script to config docker
  template:
    src: config_docker.sh.j2
    dest: "/tmp/config_docker.sh"
    mode: '0755'

- name: Config local docker to use Harbor
  shell: /tmp/config_docker.sh

- name: Stop Harbor service before restarting Docker
  ansible.builtin.systemd:
    name: harbor
    state: stopped
  failed_when: false

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Check whether the existing Harbor Compose file is present
  ansible.builtin.stat:
    path: "{{ harbor_install_dir }}/docker-compose.yml"
  register: harbor_compose_file

- name: Stop and remove existing Harbor containers
  ansible.builtin.command:
    argv:
      - /usr/bin/docker-compose
      - -f
      - "{{ harbor_install_dir }}/docker-compose.yml"
      - down
      - --remove-orphans
  when: harbor_compose_file.stat.exists

- name: Wait until existing Harbor containers are removed
  ansible.builtin.command:
    argv:
      - /usr/bin/docker-compose
      - -f
      - "{{ harbor_install_dir }}/docker-compose.yml"
      - ps
      - -q
  register: harbor_compose_containers
  changed_when: false
  retries: 12
  delay: 5
  until: harbor_compose_containers.stdout | trim | length == 0
  when: harbor_compose_file.stat.exists

- name: Remove old harbor
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ harbor_install_dir }}"
    - "{{ harbor_data_volume }}"

- name: Create Harbor install directory
  file:
    path: "{{ harbor_install_dir }}"
    state: directory

- name: Copy Harbor configuration
  template:
    src: harbor.yml.j2
    dest: "{{ harbor_install_dir }}/harbor.yml"

- name: Copy Harbor offline installer
  copy:
    src: files/harbor-offline-installer-v2.14.1.tgz
    dest: "{{ harbor_install_dir }}/harbor-offline-installer-v2.14.1.tgz"

- name: Extract Harbor offline installer
  unarchive:
    src: "{{ harbor_install_dir }}/harbor-offline-installer-v2.14.1.tgz"
    dest: "{{ harbor_install_dir }}"
    remote_src: yes
    extra_opts:
      - --strip-components=1

- name: Install Harbor
  shell: "./install.sh --with-trivy"
  args:
    chdir: "{{ harbor_install_dir }}"

- name: Create Harbor service
  template:
    src: harbor.service.j2
    dest: "/usr/lib/systemd/system/harbor.service"

- name: Reload systemd daemon to apply new service
  command: systemctl daemon-reload

- name: Enable and start harbor service
  systemd:
    name: harbor
    state: restarted
    enabled: yes

- pause: seconds=15
