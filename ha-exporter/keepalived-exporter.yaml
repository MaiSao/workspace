apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: keepalived-exporter
  namespace: kube-system
  labels:
    app.kubernetes.io/name: keepalived-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: keepalived-exporter
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keepalived-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9165"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: keepalived-exporter
          image: docker-registry:4000/vht/keepalived-exporter:v1.7.1-el8
          imagePullPolicy: IfNotPresent
          args:
            - "--web.listen-address=:9165"
            - "--web.telemetry-path=/metrics"
            - "--ka.pid-path=/host-run/keepalived.pid"
          ports:
            - name: metrics
              containerPort: 9165
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: host-run
              mountPath: /host-run
              readOnly: true
            - name: host-tmp
              mountPath: /tmp
              readOnly: true
      volumes:
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: keepalived-exporter
  namespace: kube-system
  labels:
    app.kubernetes.io/name: keepalived-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keepalived-exporter
  ports:
    - name: metrics
      port: 9165
      targetPort: metrics
      protocol: TCP
