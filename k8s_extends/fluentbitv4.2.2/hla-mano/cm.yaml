    [OUTPUT]
       Name  es
       Match vocs40.ocs
       Host ${FLUENT_ELASTICSEARCH_HOST}
       Port ${FLUENT_ELASTICSEARCH_PORT}
       HTTP_User elastic
       HTTP_Passwd 123456a@
       TLS             On
       TLS.Verify      Off
