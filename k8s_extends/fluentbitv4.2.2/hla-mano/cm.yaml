  parsers.conf: "[PARSER]\n    Name        pod_info\n    Format      regex\n    Regex
    \\/.*?\\/.*?\\/.*?\\/(?<namespace>.*?)_(?<pod_name>.*?)_(?<pod_id>.*)\\/(?<container_name>.*)\\/(?<num_log_file>.*).log$\n\n[PARSER]\n
    \   Name ocs.standard\n    Format regex\n    Regex  /(?<timestamp>\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}\\.\\d{3})\\s+(?<package>[^
    ]+)\\s+\\[(?<severity>[^ ]*?)\\]\\s+\\[(?<thread>[^ ]*)\\]:\\s+msisdn=\\[(?<msisdn>[^
    ]*?)\\]\\s+sessionId=\\[(?<session_id>[^ ]*?)\\](?<message>.*)/\n    Time_Format
    %Y-%m-%d %H:%M:%S.%L\n    Time_Key timestamp\n    Time_Keep False\n    Time_Offset
    +0700\n\n[PARSER]\n    Name ocs.kafka\n    Format regex\n    Regex  /\\[(?<timestamp>\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}\\,\\d{3})\\]\\s+(?<severity>[^
    ].*?)\\s+(?<message>.*)/\n    Time_Format %Y-%m-%d %H:%M:%S,%L\n    Time_Key timestamp\n
    \   Time_Keep False\n    Time_Offset +0700\n\n[PARSER]\n    Name ocs.zookeeper\n
    \   Format regex\n    Regex  /(?<timestamp>\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}\\,\\d{3})\\s+\\[(?<id>\\w+:\\d*)\\]\\s+-\\s+(?<severity>[^
    ].*?)\\s+(?<message>.*)/\n    Time_Format %Y-%m-%d %H:%M:%S,%L\n    Time_Key timestamp\n
    \   Time_Keep False\n    Time_Offset +0700\n\n\n[PARSER]\n    Name ocs.mano.standard\n
    \   Format regex\n    Regex /(?<timestamp>\\d{2}-\\d{2}-\\d{4}\\s\\d{2}:\\d{2}:\\d{2}.\\d{3})\\s+\\[(?<thread>.*?)\\]\\s+(?<severity>.*?)\\s+.\\s+\\[(?<serviceName>.*?)\\]\\s+.\\s+(?<package>.*?)\\s+(?<message>.*)/\n
    \   Time_Format %d-%m-%Y %H:%M:%S.%L\n    Time_Key timestamp\n    Time_Keep False\n
    \   Time_Offset +0700\n\n\n[PARSER]\n    Name ocs.service_from_path\n    Format
    regex\n    Regex ^\\/.*?\\/.*?\\/.*?\\/(?<cNFName>.*?)\\/(?<podId>.*?)\\/(?<podName>.*?)\\/(?<containerId>.*?)\\/.*$\n\n[PARSER]\n
    \   Name mano.standard\n    Format regex\n    Regex /(?<timestamp>\\d{2}-\\d{2}-\\d{4}
    \\d{2}:\\d{2}:\\d{2}\\.\\d{3})\\s+\\[(?<trace_id>[^\\]]*)\\]\\s+\\[(?<thread>[^\\]]+)\\]\\s+(?<severity>[A-Z]+)\\s+-\\s+\\[(?<serviceName>[^\\]]+)\\]\\s+-\\s+\\[?(?<log_type>[A-Z_]+)\\]?(?:\\s+-\\s+|\\s+)(?<message>.*)/
    \n    Time_Format %d-%m-%Y %H:%M:%S.%L\n    Time_Key timestamp\n    Time_Keep
    False\n    Time_Offset +0700\n\n[PARSER]\n    Name mano.service_from_path\n    Format
    regex\n    Regex ^\\/.*?\\/.*?\\/(?<objectName>.*?)\\/(?<subObjectName>.*?)\\/(?<podIP>.*?)\\/.*$\n\n[PARSER]\n
    \   Name cri\n    Format regex\n    Regex /(?<timestamp>[^ ]+) (?<stream>stdout|stderr)
    (?<logtag>[^ ]*) (?<message>.*)/\n    Time_Key  timestamp\n    Time_Keep False\n
    \   Time_Offset +0700\n    Time_Format %Y-%m-%dT%H:%M:%S.%L%z\n\n[PARSER]\n    Name
    audit\n    Format json\n    Time_Key requestReceivedTimestamp\n    Time_Offset
    +0700\n\n[PARSER]\n    Name ocs.siu-parser-01\n    Format regex\n    Regex /SPL_TRC:
    \\[(?<spl>.*)\\]\\[ (?<timestamp>\\w{3}\\s+\\d{2}\\s+\\d{1,2}\\.\\d{1,2}\\.\\d{1,2}\\.\\d{1,3})
    \\]\\s+(?<message>.*)/\n    Time_Format  %b %d %H.%M.%S.%L\n    Time_Key timestamp\n
    \   Time_Keep False\n    Time_Offset +0700\n\n[PARSER]\n    Name ocs.siu-parser-02\n
    \   Format regex\n    Regex /\\[\\s+(?<timestamp>\\w{3}\\s+\\d{1,2}\\s+\\d{1,2}\\.\\d{1,2}\\.\\d{1,2}\\.\\d{1,3})\\s+\\]\\s+(?<message>.*)/\n
    \   Time_Format  %b %d %H.%M.%S.%L\n    Time_Key timestamp\n    Time_Keep False\n
    \   Time_Offset +0700\n\n[PARSER]\n    Name ocs.siu-parser-03\n    Format regex\n
    \   Regex /(?<timestamp>\\d{4}\\-\\d{0,2}\\-\\d{0,2}\\s+\\d{0,2}:\\d{0,2}:\\d{0,2},\\d{0,3})\\s+(?<message>.*)/\n
    \   Time_Format  %Y-%m-%d %H:%M:%S,%L\n    Time_Key timestamp\n    Time_Keep False\n
    \   Time_Offset +0700\n\n[PARSER]\n    Name        mongodb\n    Format      regex\n
    \   Regex       /(?<timestamp>[^ ]+)\\s+(?<severity>[A-Z])\\s+(?<component>\\S+)\\s+\\[(?<context>[^\\]]+)\\]\\s+(?<message>.*)/\n
    \   Time_Key    time\n    Time_Format %Y-%m-%dT%H:%M:%S.%L%z\n    Time_Key timestamp\n
    \   Time_Keep False\n    Time_Offset +0700\n\n[PARSER]\n    Name   kube_container_path\n
    \   Format regex\n    Regex  ^\\/var\\/log\\/containers\\/(?<pod_name>[^_]+)_(?<namespace>[^_]+)_(?<container_name_id>.+)\\.log$\n\n[PARSER]\n
    \   Name mda-jsonl-parser\n    Format json\n    Time_Key timestamp\n    Time_Offset
    +0700\n\n[PARSER]\n    Name mda-jsonl-log-path\n    Format regex\n    Regex ^\\/.*?\\/.*?\\/(?<vnfInstanceName>.*?)\\/(?<vnfInstanceId>.*?)\\/(?<vnfcName>.*?)\\/(?<vnfcId>.*?)\\/.*$\n\n[PARSER]\n
    \   Name mysql_audit_json\n    Format json\n    Time_Key timestamp\n    Time_Format
    %Y-%m-%dT%H:%M:%SZ\n\n[PARSER]\n    Name mysql_audit_inner\n    Format json\n
    \   Time_Key timestamp\n    Time_Format %Y-%m-%dT%H:%M:%SZ\n\n[PARSER]\n    Name
    \       mysql_audit_time\n    Format      json\n    Time_Key    timestamp\n    Time_Format
    %Y-%m-%dT%H:%M:%SZ\n    Time_Keep   Off\n\n[PARSER]\n    Name   mysql_slow_firstline\n
    \   Format regex\n    Regex  ^# Time:\n\n[PARSER]\n    Name        mysql_slow_parser\n
    \   Format      regex\n    Time_Key    timestamp\n    Time_Format %Y-%m-%dT%H:%M:%S.%L\n
    \   Time_Offset +0000\n    Regex  ^# Time: (?<timestamp>[^\\n]+)\\n# User@Host:
    (?<user>[^\\n]+)\\n# Schema: (?<schema>\\S+).*?\\n# Query_time: (?<query_time>[0-9\\.]+)\\s+Lock_time:\\s+(?<lock_time>[0-9\\.]+)\\s+Rows_sent:\\s+(?<rows_sent>[0-9]+)\\s+Rows_examined:\\s+(?<rows_examined>[0-9]+).*?\\nSET
    timestamp=(?<ts>[0-9]+);\\n(?<query>.*)\n"
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: fluent-bit-ocs-config
  namespace: fluentbit
