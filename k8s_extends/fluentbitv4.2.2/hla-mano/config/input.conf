[INPUT]
    Name tail
    Refresh_Interval 5
    Rotate_Wait 600
    Alias audit-k8s
    Buffer_Chunk_Size ${CHUNK_SIZE}
    Buffer_Max_Size ${BUFF_SIZE}
    Mem_Buf_Limit ${MEM_SIZE}
    Tag audit.k8s
    Offset_Key On
    Path /u01/k8saudit/audit.log
    Key raw_message
    DB /data/db/k8s-audit.db
    Multiline On
    Parser_Firstline audit
    Skip_Long_Lines On
    skip_empty_lines On
    Static_Batch_Size 10MB
    storage.type filesystem
    storage.pause_on_chunks_overlimit off

[INPUT]
    Name systemd
    Alias kubelet
    Tag host.kubelet
    Path /run/log/journal
    Systemd_Filter _SYSTEMD_UNIT=kubelet.service
    Read_From_Tail On
[INPUT]
    Name systemd
    Alias containerd
    Tag host.containerd
    Systemd_Filter _SYSTEMD_UNIT=containerd.service
    Path /run/log/journal
    Read_From_Tail On
[INPUT]
    Name systemd
    Alias haproxy
    Tag host.haproxy
    Systemd_Filter _SYSTEMD_UNIT=haproxy.service
    Path /run/log/journal
    Read_From_Tail On
[INPUT]
    Name systemd
    Alias keepalived
    Tag host.keepalived
    Systemd_Filter _SYSTEMD_UNIT=keepalived.service
    Path /run/log/journal
    Read_From_Tail On

[INPUT]
    Name tail
    Refresh_Interval 5
    Rotate_Wait 600
    Alias kubepods
    Buffer_Chunk_Size ${CHUNK_SIZE}
    Buffer_Max_Size ${BUFF_SIZE}
