[OUTPUT]
   Name  es
   Match vocs40.kube
   Host ${FLUENT_ELASTICSEARCH_HOST}
   Port ${FLUENT_ELASTICSEARCH_PORT}
   HTTP_User elastic
   HTTP_Passwd 123456a@
   TLS             On
   TLS.Verify      Off
   Logstash_Format Off
   Index k8s
   Replace_Dots Off
   Generate_ID Off
   Retry_Limit False
   net.connect_timeout 5
   net.keepalive on
   Trace_Error On
   Suppress_Type_Name On
   Workers 2
   Buffer_Size 10M
   storage.total_limit_size 20G

