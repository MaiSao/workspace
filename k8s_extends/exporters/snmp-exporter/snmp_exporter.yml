apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: snmp-exporter
  namespace: kube-system
  labels:
    app: snmp-exporter
spec:
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      hostNetwork: true
      containers:
        - name: snmp-exporter
          image: harbor-registry:8018/prom/snmp-exporter:v0.15.0-vht
          imagePullPolicy: Always
