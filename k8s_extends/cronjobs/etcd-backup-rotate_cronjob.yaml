apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup-rotate
  namespace: kube-system
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      creationTimestamp: null
    spec:
      completions: 3
      parallelism: 3
      template:
        metadata:
          creationTimestamp: null
          labels:
            task: etcd-backup-rotate
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                  - key: task
                    operator: In
                    values:
                    - etcd-backup-rotate
                topologyKey: kubernetes.io/hostname
          containers:
          - env:
            - name: ETCDCTL_API
              value: "3"
            image: harbor-registry:8018/registry.k8s.io/etcd-backup:3.5.15
            imagePullPolicy: IfNotPresent
            name: etcd-backup-rotate
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /etc/kubernetes/pki/etcd
              name: etcd-certs
              readOnly: true
            - mountPath: /backup
              name: backup
          dnsPolicy: ClusterFirst
          hostNetwork: true
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          tolerations:
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
          volumes:
          - hostPath:
              path: /etc/kubernetes/pki/etcd
              type: DirectoryOrCreate
            name: etcd-certs
          - hostPath:
              path: /u01/etcdbackup
              type: DirectoryOrCreate
            name: backup
  schedule: 0 0 * * *
  successfulJobsHistoryLimit: 8
  suspend: false
  timeZone: Asia/Ho_Chi_Minh

