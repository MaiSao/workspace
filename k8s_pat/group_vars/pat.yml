  - id: PAT-D11
    title: Stateful volume node-loss behavior
    priority: P0
    mode: AUTO-CHAOS
    scope: cluster
    category: storage
    applicable: "{{ (pat_features.csi_storage | bool) and (pat_enable_chaos | bool) }}"
