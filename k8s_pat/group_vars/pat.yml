  - id: PAT-D07
    title: Non-VIP control-plane component failure
    priority: P0
    mode: AUTO-CHAOS
    scope: master
    category: resilience
    applicable: "{{ pat_enable_chaos | bool }}"
    na_reason: "Chaos PAT is disabled by pat_enable_chaos."
