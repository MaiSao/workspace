---
#===============================================================================
# KUBERNETES PAT INPUTS
# This file is self-contained. It intentionally does not import variables from
# k8s_auto so PAT can be run after installation or against another cluster.
#===============================================================================

pat_run_id: "{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
pat_output_dir: /root/k8s_pat/reports
pat_report_prefix: "k8s-pat-{{ pat_run_id }}"
pat_kubeconfig: /etc/kubernetes/admin.conf
pat_namespace: k8s-pat
pat_evidence_dir: /root/k8s_pat/evidence
pat_app_namespace_exclude_regex: '^(default|kube-system|kube-public|kube-node-lease|kyverno|local-path-storage|fluentbit|k8s-pat)$'
pat_rollout_timeout: 180s
pat_command_timeout_seconds: 30
pat_log_case_details: true
pat_fail_play_on_failed_cases: false
pat_record_catalog_gap_cases: false
pat_api_latency_p99_ms: 1000
pat_dns_latency_p95_ms: 100
pat_soak_minutes: 1440
pat_soak_iterations: 60

pat_master_hosts: "{{ groups.get('k8s_master', []) }}"
pat_worker_hosts: "{{ groups.get('k8s_worker', []) }}"
pat_cluster_hosts: "{{ (pat_master_hosts + pat_worker_hosts) | unique | list }}"
pat_bootstrap_master: "{{ pat_master_hosts | first }}"
pat_allow_master_hybrid: true
pat_min_worker_count: 3
pat_registry_prefix: docker-registry:4000
pat_test_image: "{{ pat_registry_prefix }}/vht/busybox:1.37.0"
pat_curl_image: "{{ pat_registry_prefix }}/efk/curl:8.11.1"
pat_kubectl_image: "{{ pat_registry_prefix }}/bitnami/kubectl:1.30.1"

# Update this from the currently approved Kubernetes support window.
# On 2026-07-24, Kubernetes 1.31 is already EOL.
pat_min_supported_k8s_minor: 32

# Applicability switches. A case with an unavailable feature becomes N/A with
# its configured reason and recommendation, instead of silently passing.
pat_features:
  ha_control_plane: true
  haproxy_keepalived: true
  multus: true
  whereabouts: true
  macvlan: true
  sriov: false
  hpa: false
  ingress_or_gateway: false
  waf_or_api_gateway: false
  csi_storage: false
  local_path_stateful: true
  kyverno_or_psa: true
  prometheus_compatible_monitoring: false
  log_backend: true
  registry_policy: false
  secret_encryption_at_rest: false

# Mirrors the current k8s_auto service plan. Keep this section aligned with
# ../k8s_auto/group_vars/services.yml when the installer profile changes.
pat_installed_services:
  common: true
  containerd: true
  haproxy: true
  keepalived: true
  kubeadm: true
  calico: true
  multus: true
  whereabouts: true
  macvlan: true
  sriov: false
  coredns: true
  metrics_server: true
  kube_state_metrics: true
  kubelet_csr_approver: true
  kyverno: true
  etcd_jobs: true
  cert_exporter: true
  snmp_exporter: true
  snmp_switch_exporter: true
  haproxy_exporter: true
  keepalived_exporter: true
  ip_pools_exporter: false
  k8s_tuning: true
  fluentbit: true
  local_path_provisioner: true
  elasticsearch: false

pat_expected_macvlan_nads:
  - ocs-cgw-data-gx
  - ocs-cgw-data-gy
  - ocs-cgw-data-n7
  - ocs-cgw-data-n40
  - ocs-authen-server
  - ocs-cgw-pro
  - ocs-app
  - aerospike-app
  - aerospike-linksite

pat_expected_kyverno_policies:
  - block-specific-nodeports
  - enforce-run-as-nonroot
  - require-pod-resources

pat_expected_exporter_daemonsets:
  - snmp-exporter
  - haproxy-exporter
  - keepalived-exporter

pat_allowed_cluster_admin_subject_regex: 'Group::system:masters'

# Synthetic and chaos execution gates. Keep them false on production until the
# PAT namespace quota, QPS, PVC size and cleanup behavior are approved.
pat_enable_prod_synthetic: false
pat_enable_chaos: false
pat_enable_lab_dr: false
pat_require_manual_evidence: true
pat_chaos_target_worker_node: ""
pat_chaos_target_master_node: ""
pat_chaos_target_etcd_member_host: ""
pat_chaos_target_cni_node: "{{ pat_chaos_target_worker_node }}"
pat_lab_restore_evidence_file: "{{ pat_evidence_dir }}/PAT-D12-etcd-restore.md"
pat_runtime_restart_evidence_file: "{{ pat_evidence_dir }}/PAT-D04-runtime-restart.md"
pat_control_plane_failure_evidence_file: "{{ pat_evidence_dir }}/PAT-D07-control-plane-failure.md"
pat_vip_failover_evidence_file: "{{ pat_evidence_dir }}/PAT-D08-vip-failover.md"
pat_etcd_member_failure_evidence_file: "{{ pat_evidence_dir }}/PAT-D09-etcd-member-failure.md"
pat_stateful_volume_failure_evidence_file: "{{ pat_evidence_dir }}/PAT-D11-stateful-volume-failure.md"
pat_lab_cert_renew_evidence_file: "{{ pat_evidence_dir }}/PAT-D13-cert-renew.md"
pat_lab_join_detach_evidence_file: "{{ pat_evidence_dir }}/PAT-D14-join-detach.md"
pat_lab_upgrade_evidence_file: "{{ pat_evidence_dir }}/PAT-D15-upgrade.md"
pat_manual_topology_evidence_file: "{{ pat_evidence_dir }}/PAT-F01-topology.md"
pat_manual_runbook_evidence_file: "{{ pat_evidence_dir }}/PAT-F02-runbook.md"
pat_manual_firewall_evidence_file: "{{ pat_evidence_dir }}/PAT-F03-firewall.md"
pat_manual_route_waf_evidence_file: "{{ pat_evidence_dir }}/PAT-F04-route-waf.md"
pat_manual_registry_evidence_file: "{{ pat_evidence_dir }}/PAT-F05-registry.md"
pat_manual_source_secret_scan_file: "{{ pat_evidence_dir }}/PAT-B10-source-secret-scan.md"
pat_synthetic_alert_evidence_file: "{{ pat_evidence_dir }}/PAT-B13-synthetic-alert.md"

pat_case_defaults:
  enabled: true
  applicable: true
  scope: cluster
  priority: P0
  mode: PROD-RO
  category: baseline
  na_reason: ""
  recommendation: "Review the case and define remediation in the PAT report."

