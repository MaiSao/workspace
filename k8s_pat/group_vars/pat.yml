    priority: P0
    mode: PROD-RO
    scope: cluster
    category: lifecycle
    command: |
      minor="$(
        kubectl version -o json |
        sed -n 's/.*"minor": *"\([0-9][0-9]*\).*/\1/p' |
        tail -1
      )"
      test -n "${minor}"
      test "${minor}" -ge {{ pat_min_supported_k8s_minor }}
      kubectl api-resources >/dev/null
    success_hint: "Cluster minor version is supported by the configured PAT baseline."
    recommendation: "Upgrade before EOL and scan manifests/live objects for removed APIs before version changes."

