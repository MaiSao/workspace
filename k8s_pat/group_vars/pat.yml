    recommendation: "Run with current VIP holder detection and API latency guard."

  - id: PAT-D09
    title: Etcd single-member failure
    priority: P0
    mode: AUTO-CHAOS
    scope: master
    category: resilience
    applicable: "{{ pat_enable_chaos | bool }}"
