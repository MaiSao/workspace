  - id: PAT-E02
    title: DNS latency and success soak
    priority: P0
    mode: PROD-SYN
    scope: cluster
    category: performance
    applicable: "{{ pat_enable_prod_synthetic | bool }}"
    na_reason: "Production synthetic DNS performance tests are disabled."
    command: |
      kubectl -n kube-system rollout status deployment/coredns --timeout={{ pat_rollout_timeout }}
      kubectl create namespace {{ pat_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      kubectl -n {{ pat_namespace }} run pat-dns-loop-{{ pat_run_id | lower }} --image={{ pat_test_image }} --restart=Never --command -- sh -c 'i=0; while [ "$i" -lt 20 ]; do nslookup kubernetes.default.svc.cluster.local >/dev/null || exit 1; i=$((i+1)); done'
      kubectl -n {{ pat_namespace }} wait --for=condition=Succeeded pod/pat-dns-loop-{{ pat_run_id | lower }} --timeout={{ pat_rollout_timeout }}
      kubectl -n {{ pat_namespace }} delete pod/pat-dns-loop-{{ pat_run_id | lower }} --ignore-not-found=true --wait=true
    success_hint: "DNS performance probe completed."
    recommendation: "Enable bounded DNS query test from multiple nodes and verify success/p95 latency."

  - id: PAT-E03
    title: Network throughput and MTU baseline
    priority: P1
    mode: PROD-SYN
    scope: cluster
    category: performance
    applicable: "{{ pat_enable_prod_synthetic | bool }}"
    na_reason: "Production synthetic network performance tests are disabled."
    command: |
      kubectl -n kube-system rollout status daemonset/calico-node --timeout={{ pat_rollout_timeout }}
      kubectl create namespace {{ pat_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      kubectl -n {{ pat_namespace }} delete pod pat-mtu-target pat-mtu-client --ignore-not-found=true --wait=true
      kubectl -n {{ pat_namespace }} run pat-mtu-target --image={{ pat_test_image }} --restart=Never --command -- sh -c 'sleep 3600'
      kubectl -n {{ pat_namespace }} wait --for=condition=Ready pod/pat-mtu-target --timeout={{ pat_rollout_timeout }}
      target_ip="$(kubectl -n {{ pat_namespace }} get pod pat-mtu-target -o jsonpath='{.status.podIP}')"
      kubectl -n {{ pat_namespace }} run pat-mtu-client --image={{ pat_test_image }} --restart=Never --command -- sh -c "ping -c 3 -s 1400 ${target_ip}"
      kubectl -n {{ pat_namespace }} wait --for=condition=Succeeded pod/pat-mtu-client --timeout={{ pat_rollout_timeout }}
      kubectl -n {{ pat_namespace }} delete pod pat-mtu-target pat-mtu-client --ignore-not-found=true --wait=true
    success_hint: "Network performance probe completed."
    recommendation: "Run bounded iperf/MTU test in lab or approved production window."

