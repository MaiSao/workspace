  - id: PAT-D08
    title: VIP failover resilience
    priority: P0
    mode: AUTO-CHAOS
    scope: master
    category: resilience
    applicable: "{{ pat_enable_chaos | bool }}"
    na_reason: "Chaos PAT is disabled by pat_enable_chaos."
